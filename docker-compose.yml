version: '3.8'

networks:
  pipeline_network:
    driver: bridge

volumes:
  pipeline_n8n_storage:
  pipeline_postgres_storage:

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: pipeline_n8n
    ports:
      - "5679:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5679
    volumes:
      - pipeline_n8n_storage:/home/node/.n8n
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - pipeline_network
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: pipeline_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secretpassword
      - POSTGRES_DB=pipeline_db
    volumes:
      - pipeline_postgres_storage:/var/lib/postgresql/data
      - ./memory/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - pipeline_network
    restart: unless-stopped